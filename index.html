            theme: {
                extend: {
                    fontFamily: {
                        body: ['Outfit', 'sans-serif'],

                        yellow: '#EAB308',

    <style>
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #07080e;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2030;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8b5cf6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #07080e;
        }

        @media (min-width: 768px) {
            .content-with-sidebar {
                margin-left: 78px;
            }
        }

        /* Hide scrollbars but allow scroll */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Loading skeleton animations */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .skeleton {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            background-color: rgba(255, 255, 255, 0.08);
        }

        /* Loading spinner */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50vh;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Intro Splash Animations */
        @keyframes logo-intro {
            0% {
                transform: scale(0.85);
                letter-spacing: 0.1em;
                opacity: 0;
                filter: blur(4px);
            }
            30% {
                opacity: 1;
                filter: blur(0);
            }
            100% {
                transform: scale(1.1);
                letter-spacing: 0.3em;
                opacity: 0.95;
            }
        }

        @keyframes glow-pulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(139, 92, 246, 0.4), 0 0 20px rgba(139, 92, 246, 0.2);
            }
            50% {
                text-shadow: 0 0 20px rgba(139, 92, 246, 0.7), 0 0 35px rgba(139, 92, 246, 0.4), 0 0 50px rgba(139, 92, 246, 0.2);
            }
        }

        @keyframes fade-out-intro {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(1.03);
                pointer-events: none;
            }
        }
    </style>
</head>

    <script>
        const API_KEY = 'a6042a94d5273c9abd084294d505c7b0';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';
        const IMAGE_BASE_ORIGINAL = 'https://image.tmdb.org/t/p/original';

        // --- Hero Slider Global State ---
        let heroIndex = 0;
        let heroInterval = null;
        let trendingItems = [];

        function updateHeroSlide(index, items) {
            const slideContainer = document.getElementById('heroSlideContainer');
            if (!slideContainer) return;
            
            // Smooth fade transition
            slideContainer.classList.add('opacity-0', 'scale-[1.02]');
            
            setTimeout(() => {
                const item = items[index];
                if (!item) return;
                const title = item.title || item.name;
                const year = new Date(item.release_date || item.first_air_date).getFullYear() || '';
                const type = item.media_type || (item.name ? 'tv' : 'movie');
                
                slideContainer.innerHTML = `
                    <div class="absolute inset-0">
                        <img src="${IMAGE_BASE_ORIGINAL}${item.backdrop_path}" alt="${title}" class="w-full h-full object-cover opacity-45 select-none" />
                        <div class="absolute inset-0 bg-gradient-to-t from-[#07080e] via-[#07080e]/40 to-transparent md:bg-gradient-to-r md:from-[#07080e] md:via-[#07080e]/30 md:to-transparent"></div>
                    </div>
                    <div class="relative flex min-h-[42vh] flex-col justify-end px-6 pb-12 pt-24 text-left md:min-h-[58vh] md:px-12 md:pb-16 md:pt-32">
                        <div class="grid grid-cols-1 lg:grid-cols-3 w-full max-w-7xl mx-auto gap-8 items-end">
                            <!-- Left: Info Content -->
                            <div class="lg:col-span-2 space-y-4">
                                <div class="flex flex-wrap items-center gap-2">
                                    <span class="bg-white/10 backdrop-blur-md px-3 py-1 rounded-full text-xs font-semibold text-gray-200">${year}</span>
                                    <span class="bg-[#8b5cf6]/20 border border-[#8b5cf6]/30 px-3 py-1 rounded-full text-xs font-semibold text-[#a78bfa] tracking-wider uppercase">${type.toUpperCase()}</span>
                                    <span class="bg-white/10 backdrop-blur-md px-3 py-1 rounded-full text-xs font-semibold text-yellow-500 flex items-center gap-1">⭐ ${item.vote_average.toFixed(1)}</span>
                                </div>
                                <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight text-white leading-tight font-display drop-shadow-md select-none">${title}</h1>
                                <p class="text-xs md:text-sm text-gray-300 line-clamp-3 max-w-lg leading-relaxed">${item.overview}</p>
                                <div class="flex flex-wrap gap-3 pt-2">
                                    <a href="#/${type}/${item.id}" class="inline-flex items-center justify-center gap-2 px-6 py-2.5 bg-gradient-to-r from-primary to-[#7c3aed] text-white text-sm font-bold rounded-full hover:scale-105 transition-all shadow-[0_0_20px_rgba(139,92,246,0.4)]">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                        Watch Now
                                    </a>
                                    <button onclick="toggleWatchlist(${item.id}, '${type}', '${title.replace(/'/g, "\\'")}', '${item.poster_path}', ${item.vote_average}, '${year}')" class="inline-flex items-center justify-center gap-2 px-6 py-2.5 bg-white/5 border border-white/10 text-white text-sm font-bold rounded-full hover:bg-white/10 transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path></svg>
                                        + Watchlist
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Right: Thumbnails stack for PC -->
                            <div class="hidden lg:flex flex-col gap-2.5 bg-black/40 backdrop-blur-md border border-white/5 rounded-2xl p-4 shrink-0 select-none ml-auto">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Trending Movies</span>
                                <div class="flex gap-2">
                                    ${items.slice(0, 5).map((thumb, idx) => {
                                        const activeClass = idx === index ? 'border-primary ring-2 ring-primary/40 scale-105' : 'border-white/10 opacity-60 hover:opacity-100 hover:scale-102';
                                        return `
                                            <div onclick="changeHeroIndex(${idx})" class="w-14 h-20 rounded-xl overflow-hidden cursor-pointer border-2 transition-all duration-300 ${activeClass}">
                                                <img src="${IMAGE_BASE}${thumb.poster_path}" alt="Thumb" class="w-full h-full object-cover"/>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                slideContainer.classList.remove('opacity-0', 'scale-[1.02]');
            }, 250);
        }

        window.changeHeroIndex = (idx) => {
            if (heroInterval) {
                clearInterval(heroInterval);
            }
            heroIndex = idx;
            updateHeroSlide(heroIndex, trendingItems);
            
            heroInterval = setInterval(() => {
                heroIndex = (heroIndex + 1) % trendingItems.length;
                updateHeroSlide(heroIndex, trendingItems);
            }, 6000);
        };

        // --- AniList API Integration (GraphQL) ---
        const ANILIST_API_URL = 'https://graphql.anilist.co';

        async function fetchAniList(query, variables = {}) {
            try {
                const response = await fetch(ANILIST_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ query, variables })
                });
                const result = await response.json();
                if (result.errors) {
                    console.error("AniList GraphQL Error:", result.errors);
                    return null;
                }
                return result.data;
            } catch (error) {
                console.error("AniList Fetch Error:", error);
                return null;
            }
        }

        const ANILIST_TRENDING_QUERY = `
            query ($page: Int, $perPage: Int) {
              Page(page: $page, perPage: $perPage) {
                media(type: ANIME, sort: TRENDING_DESC) {
                  id
                  title {
                    romaji
                    english
                    userPreferred
                  }
                  coverImage {
                    large
                    extraLarge
                  }
                  bannerImage
                  description
                  averageScore
                  seasonYear
                  episodes
                  nextAiringEpisode {
                    episode
                  }
                  format
                  genres
                }
              }
            }
        `;

        const ANILIST_POPULAR_QUERY = `
            query ($page: Int, $perPage: Int) {
              Page(page: $page, perPage: $perPage) {
                media(type: ANIME, sort: POPULARITY_DESC) {
                  id
                  title {
                    romaji
                    english
                    userPreferred
                  }
                  coverImage {
                    large
                    extraLarge
                  }
                  bannerImage
                  description
                  averageScore
                  seasonYear
                  episodes
                  nextAiringEpisode {
                    episode
                  }
                  format
                  genres
                }
              }
            }
        `;

        function updateNavState(hash) {
            // Reset Sidebar & Mobile
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.add('text-gray-400');
                el.classList.remove('text-primary', 'text-white');
                el.querySelector('.active-indicator')?.classList.add('hidden');
            });
            document.querySelectorAll('.nav-link-mobile').forEach(el => {
                el.classList.add('text-gray-500', 'hover:bg-white/10', 'hover:text-white');
                el.classList.remove('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/30');
                el.querySelector('.nav-text-mobile')?.classList.remove('text-white');
            });

            // Reset Top Pills
            document.querySelectorAll('.nav-pill').forEach(el => {
                el.classList.remove('border-primary', 'bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/30');
                el.classList.add('bg-[#11131a]/90', 'text-white', 'border-white/10');
            });

            let currentNav = 'home';
            let topNavActive = 'top-home';

            if (hash.startsWith('/search')) currentNav = 'search';
            else if (hash === '/watchlist') currentNav = 'watchlist';
            if (hash === '/movies') topNavActive = 'top-movies';
            else if (hash === '/tv-shows') topNavActive = 'top-tv';
            else if (hash === '/anime') topNavActive = 'top-anime';
            else if (hash.startsWith('/movie/') || hash.startsWith('/tv/') || hash.startsWith('/watch/') || hash.startsWith('/anime/')) {
                topNavActive = '';
            }

            // Set Sidebar Active
            const sidebarLinks = document.querySelectorAll(`.nav-link[data-nav="${currentNav}"]`);
            sidebarLinks.forEach(el => {
                el.classList.remove('text-gray-400');
                el.classList.add('text-primary');
                el.querySelector('.active-indicator').classList.remove('hidden');
                el.querySelector('.nav-icon').classList.add('drop-shadow-[0_0_8px_rgba(139,92,246,0.6)]');
            });

            // Set Mobile Active
            const mobileLinks = document.querySelectorAll(`.nav-link-mobile[data-nav="${currentNav}"]`);
            mobileLinks.forEach(el => {
                el.classList.remove('text-gray-500', 'hover:bg-white/10', 'hover:text-white');
                el.classList.add('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/30');
                el.querySelector('.nav-text-mobile').classList.add('text-white');
            });

            // Set Top Pill Active
            if (topNavActive) {
                const topPills = document.querySelectorAll(`.nav-pill[data-nav="${topNavActive}"]`);
                topPills.forEach(el => {
                    el.classList.remove('border-white/10', 'bg-[#11131a]/90', 'text-white', 'hover:bg-[#1b1f2a]');
                    el.classList.add('border-primary', 'bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/30');
                });
            }

            // Show/Hide top nav container
            const topNavContainer = document.getElementById('topNavContainer');
            if (hash === '/' || hash === '' || hash === '/movies' || hash === '/tv-shows' || hash === '/anime') {
                topNavContainer.style.display = 'block';
            } else {
                topNavContainer.style.display = 'none';
            }
        }

        // --- Fetch API ---
        async function fetchAPI(endpoint) {
            const separator = endpoint.includes('?') ? '&' : '?';
            try {
                const res = await fetch(`${BASE_URL}${endpoint}${separator}api_key=${API_KEY}`);
                if (!res.ok) throw new Error('Network response was not ok');
                return await res.json();
            } catch (error) {
                console.error("Fetch error:", error);
                return null;
            }
        }

        async function renderSearch(container) {
            let searchMode = 'tmdb'; // 'tmdb' or 'anilist'

            container.innerHTML = `
                    <div class="max-w-7xl mx-auto mt-4 md:mt-8">
                        <div class="relative max-w-2xl mx-auto mb-6">
                            <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                            <input type="text" id="searchInput" class="w-full bg-[#11131a] border border-white/10 rounded-full py-4 pl-12 pr-6 text-white text-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-gray-500" placeholder="Search movies, tv shows, anime..." autocomplete="off"/>
                        </div>
                        <div class="flex justify-center gap-3 mb-8">
                            <button id="tabTmdb" class="px-5 py-1.5 rounded-full border border-primary bg-primary text-white text-xs font-semibold shadow-lg shadow-primary/25 transition-all">Movies & TV</button>
                            <button id="tabAnilist" class="px-5 py-1.5 rounded-full border border-white/10 bg-[#11131a]/90 text-white text-xs font-semibold hover:bg-[#1b1f2a] transition-all">Anime</button>
                        </div>
                        <div id="searchResults" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
                            <div class="col-span-full text-center text-gray-500 py-20 text-lg">
                                Type to start searching...
                            </div>
                        </div>
                    </div>
                `;

            const input = document.getElementById('searchInput');
            const resultsDiv = document.getElementById('searchResults');
            const tabTmdb = document.getElementById('tabTmdb');
            const tabAnilist = document.getElementById('tabAnilist');

            if (window.innerWidth > 768) {
                setTimeout(() => input.focus(), 100);
            }

            let debounceTimer;

            const executeSearch = async () => {
                const query = input.value.trim();
                if (!query) {
                    resultsDiv.innerHTML = '<div class="col-span-full text-center text-gray-500 py-20 text-lg">Type to start searching...</div>';
                    return;
                }

                resultsDiv.innerHTML = '<div class="col-span-full flex justify-center py-20"><div class="spinner"></div></div>';

                if (searchMode === 'tmdb') {
                    const data = await fetchAPI(`/search/multi?query=${encodeURIComponent(query)}`);
                    if (data && data.results && data.results.length > 0) {
                        const filtered = data.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv');
                        if (filtered.length > 0) {
                            resultsDiv.innerHTML = filtered.filter(item => item.poster_path).map(item => {
                                const type = item.media_type || 'movie';
                                const title = item.title || item.name;
                                const year = new Date(item.release_date || item.first_air_date).getFullYear() || '';
                                return `
                                        <a href="#/${type}/${item.id}" class="w-full space-y-3 group block">
                                            <div class="relative overflow-hidden rounded-2xl border border-white/10 bg-white/5 transition-transform duration-200 group-hover:-translate-y-1 group-hover:shadow-xl group-hover:shadow-primary/20 aspect-[2/3]">
                                                <img src="${IMAGE_BASE}${item.poster_path}" alt="${title}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy" />
                                                ${getRatingBadge(item.vote_average)}
                                            </div>
                                            <div>
                                                <div class="text-[14px] font-medium truncate">${title}</div>
                                                <div class="text-xs text-gray-400 mt-1">${year} ${type === 'movie' ? '• Movie' : '• TV'}</div>
                                            </div>
                                        </a>
                                    `;
                            }).join('');
                        } else {
                            resultsDiv.innerHTML = '<div class="col-span-full text-center text-gray-500 py-20 text-lg">No movies or TV shows found.</div>';
                        }
                    } else {
                        resultsDiv.innerHTML = '<div class="col-span-full text-center text-gray-500 py-20 text-lg">No results found.</div>';
                    }
                } else {
                    // AniList Anime search
                    const data = await fetchAniList(ANILIST_SEARCH_QUERY, { search: query, page: 1, perPage: 24 });
                    if (data && data.Page && data.Page.media && data.Page.media.length > 0) {
                        resultsDiv.innerHTML = buildAniListCards(data.Page.media);
                    } else {
                        resultsDiv.innerHTML = '<div class="col-span-full text-center text-gray-500 py-20 text-lg">No anime found.</div>';
                    }
                }
            };

            input.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(executeSearch, 600);
            });

            tabTmdb.addEventListener('click', () => {
                if (searchMode === 'tmdb') return;
                searchMode = 'tmdb';
                tabTmdb.className = "px-5 py-1.5 rounded-full border border-primary bg-primary text-white text-xs font-semibold shadow-lg shadow-primary/25 transition-all";
                tabAnilist.className = "px-5 py-1.5 rounded-full border border-white/10 bg-[#11131a]/90 text-white text-xs font-semibold hover:bg-[#1b1f2a] transition-all";
                executeSearch();
            });

            tabAnilist.addEventListener('click', () => {
                if (searchMode === 'anilist') return;
                searchMode = 'anilist';
                tabAnilist.className = "px-5 py-1.5 rounded-full border border-primary bg-primary text-white text-xs font-semibold shadow-lg shadow-primary/25 transition-all";
                tabTmdb.className = "px-5 py-1.5 rounded-full border border-white/10 bg-[#11131a]/90 text-white text-xs font-semibold hover:bg-[#1b1f2a] transition-all";
                executeSearch();
            });
        }

                            <div class="mt-12">
                                <h2 class="text-xl sm:text-2xl font-bold mb-6 text-white">Recommendations</h2>
                                <div class="flex gap-3 overflow-x-auto pb-4 hide-scrollbar -mx-1 pl-1 cursor-grab active:cursor-grabbing">
                                    ${buildMediaCards(similar.results, 'tv')}
                                </div>
                            </div>` : ''}

                        </div>
                    </div>
                `;

                container.innerHTML = html;

                const player = document.getElementById('tvVideoPlayer');
                const breadcrumbEp = document.getElementById('tvBreadcrumbEp');
                const epCounter = document.getElementById('tvEpCounter');
                const tvSeasonSelect = document.getElementById('tvSeasonSelect');
                const tvEpSearchInput = document.getElementById('tvEpSearchInput');
                const tvEpManualInput = document.getElementById('tvEpManualInput');
                const tvEpManualBtn = document.getElementById('tvEpManualBtn');
                const tvEpisodeGrid = document.getElementById('tvEpisodeGrid');
                const srvCine1 = document.getElementById('srvCine1');
                const srvCine2 = document.getElementById('srvCine2');

                const updateTVIframe = () => {
                    if (currentServer === 'cine1') {
                        player.src = `https://www.vidking.net//embed/tv/${details.id}/${currentSeason}/${currentEpisode}`;
                    } else {
                        player.src = `https://hkr4522.github.io/rjtrjrtj/tv/${details.id}/${currentSeason}/${currentEpisode}`;
                    }

                    breadcrumbEp.textContent = `S${currentSeason} : E${currentEpisode}`;

                    // Update active episode button
                    document.querySelectorAll('.tv-ep-btn').forEach(btn => {
                        const epNum = parseInt(btn.dataset.ep);
                        if (epNum === currentEpisode) {
                            btn.className = "tv-ep-btn py-2 text-center text-xs font-bold rounded-lg border border-primary bg-primary text-white shadow-md shadow-primary/20 transition-all";
                        } else {
                            btn.className = "tv-ep-btn py-2 text-center text-xs font-bold rounded-lg border border-white/5 bg-white/5 text-gray-300 hover:bg-white/10 hover:text-white transition-all";
                        }
                    });
                };

                const updateServerButtons = () => {
                    [srvCine1, srvCine2].forEach(btn => {
                        btn.className = "px-4 py-2 text-xs font-bold rounded-lg border border-white/10 bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 transition-all";
                    });
                    if (currentServer === 'cine1') {
                        srvCine1.className = "px-4 py-2 text-xs font-bold rounded-lg border border-primary bg-primary text-white shadow-[0_0_15px_rgba(139,92,246,0.4)] transition-all";
                    } else {
                        srvCine2.className = "px-4 py-2 text-xs font-bold rounded-lg border border-primary bg-primary text-white shadow-[0_0_15px_rgba(139,92,246,0.4)] transition-all";
                    }
                };

                const loadEpisodesForSeason = async (seasonNum) => {
                    tvEpisodeGrid.innerHTML = '<div class="col-span-full flex justify-center py-6"><div class="spinner !w-6 !h-6 !border-2"></div></div>';
                    const data = await fetchAPI(`/tv/${details.id}/season/${seasonNum}`);
                    
                    if (data && data.episodes) {
                        totalEpisodes = data.episodes.length;
                        epCounter.textContent = `Total: ${totalEpisodes}`;

                        const drawEpisodesGrid = (filterQuery = '') => {
                            let buttonsHTML = '';
                            let renderedCount = 0;

                            data.episodes.forEach(ep => {
                                const epNumStr = ep.episode_number.toString();
                                if (filterQuery && !epNumStr.includes(filterQuery) && !ep.name.toLowerCase().includes(filterQuery.toLowerCase())) {
                                    return;
                                }
                                renderedCount++;
                                buttonsHTML += `
                                    <button data-ep="${ep.episode_number}" class="tv-ep-btn py-2 text-center text-xs font-bold rounded-lg transition-all ${
                                        ep.episode_number === currentEpisode
                                            ? "border-primary bg-primary text-white shadow-md shadow-primary/20"
                                            : "border-white/5 bg-white/5 text-gray-300 hover:bg-white/10 hover:text-white"
                                    }">
                                        ${ep.episode_number}
                                    </button>
                                `;
                            });

                            if (renderedCount === 0) {
                                buttonsHTML = '<div class="col-span-full text-center text-gray-500 py-6 text-xs">No matches.</div>';
                            }
                            tvEpisodeGrid.innerHTML = buttonsHTML;

                            // Add click handlers
                            document.querySelectorAll('.tv-ep-btn').forEach(btn => {
                                btn.addEventListener('click', (e) => {
                                    const ep = parseInt(e.currentTarget.dataset.ep);
                                    if (ep) {
                                        currentEpisode = ep;
                                        window.location.hash = `#/watch/tv/${details.id}/${currentSeason}/${currentEpisode}`;
                                        updateTVIframe();
                                    }
                                });
                            });
                        };

                        // Store filter logic
                        tvEpSearchInput.oninput = (e) => drawEpisodesGrid(e.target.value.trim());

                        // Draw first time
                        drawEpisodesGrid();
                    } else {
                        tvEpisodeGrid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-6 text-xs">No episodes.</div>';
                        epCounter.textContent = 'Total: 0';
                    }
                    updateTVIframe();
                };

                // Server listeners
                srvCine1.addEventListener('click', () => { currentServer = 'cine1'; updateServerButtons(); updateTVIframe(); });
                srvCine2.addEventListener('click', () => { currentServer = 'cine2'; updateServerButtons(); updateTVIframe(); });

                // Season listener
                tvSeasonSelect.addEventListener('change', async (e) => {
                    currentSeason = parseInt(e.target.value);
                    currentEpisode = 1;
                    window.location.hash = `#/watch/tv/${details.id}/${currentSeason}/1`;
                    await loadEpisodesForSeason(currentSeason);
                });

                // Manual Episode
                const handleManualEpisode = () => {
                    const ep = parseInt(tvEpManualInput.value.trim());
                    if (ep && ep > 0) {
                        currentEpisode = ep;
                        if (ep > totalEpisodes) {
                            totalEpisodes = ep;
                            epCounter.textContent = `Total: ${totalEpisodes}`;
                        }
                        window.location.hash = `#/watch/tv/${details.id}/${currentSeason}/${currentEpisode}`;
                        loadEpisodesForSeason(currentSeason);
                        tvEpManualInput.value = '';
                    }
                };

                tvEpManualBtn.addEventListener('click', handleManualEpisode);
                tvEpManualInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleManualEpisode();
                });

                // Initial Load
                updateServerButtons();
                await loadEpisodesForSeason(currentSeason);
            }
        }

        async function renderWatchlist(container) {
            container.innerHTML = '<div class="flex justify-center py-32"><div class="spinner"></div></div>';
            const list = getWatchlist();
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="max-w-7xl mx-auto mt-4 md:mt-8">
                        <h2 class="text-2xl md:text-3xl font-bold mb-8">My Watchlist</h2>
                        <div class="text-center text-gray-500 py-20 text-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-4 opacity-50"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path></svg>
                            Your watchlist is empty.
                        </div>
                    </div>
                `;
                return;
            }

            const cardsHtml = list.map(item => {
                const imgUrl = item.poster_path.startsWith('http') ? item.poster_path : `${IMAGE_BASE}${item.poster_path}`;
                return `
                        <a href="#/${item.type}/${item.id}" class="w-full space-y-3 group block">
                            <div class="relative overflow-hidden rounded-2xl border border-white/10 bg-white/5 transition-transform duration-200 group-hover:-translate-y-1 group-hover:shadow-xl group-hover:shadow-primary/20 aspect-[2/3]">
                                <img src="${imgUrl}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy" />
                                ${getRatingBadge(item.vote_average)}
                            </div>
                            <div>
                                <div class="text-[14px] font-medium truncate">${item.title}</div>
                                <div class="text-xs text-gray-400 mt-1">${item.year}</div>
                            </div>
                        </a>
                    `;
            }).join('');

            container.innerHTML = `
                    <div class="max-w-7xl mx-auto mt-4 md:mt-8">
                        <h2 class="text-2xl md:text-3xl font-bold mb-8">My Watchlist</h2>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
                            ${cardsHtml}
                        </div>
                    </div>
                `;
        }

        // --- Router ---
        function router() {
            if (heroInterval) {
                clearInterval(heroInterval);
                heroInterval = null;
            }
            const hash = window.location.hash.slice(1) || '/';
            const app = document.getElementById('app');

            // Reset container classes (Player and Details remove them)
            app.className = "pt-32 md:pt-20 px-4 md:px-6";

            updateNavState(hash);
            window.scrollTo(0, 0);

            if (hash === '/' || hash === '') {
                renderHome(app);
            } else if (hash.startsWith('/search')) {
                renderSearch(app);
            } else if (hash === '/watchlist') {
                renderWatchlist(app);
            } else if (hash === '/movies') {
                renderList(app, 'movies');
            } else if (hash === '/tv-shows') {
                renderList(app, 'tv-shows');
            } else if (hash === '/anime') {
                renderList(app, 'anime');
            } else if (hash.startsWith('/watch/anime/')) {
                const parts = hash.split('/');
                const id = parts[3];
                const episode = parts[4] || '1';
                if (id) renderAnimePlayer(app, id, episode);
            } else if (hash.startsWith('/watch/movie/')) {
                const id = hash.split('/')[3];
                if (id) renderPlayer(app, 'movie', id);
            } else if (hash.startsWith('/watch/tv/')) {
                const parts = hash.split('/');
                const id = parts[3];
                const season = parts[4] || '1';
                const episode = parts[5] || '1';
                if (id) renderPlayer(app, 'tv', id, season, episode);
            } else if (hash.startsWith('/anime/')) {
                const id = hash.split('/')[2];
                if (id) renderAnimeDetails(app, id);
            } else if (hash.startsWith('/movie/')) {
                const id = hash.split('/')[2];
                if (id) renderDetails(app, 'movie', id);
            } else if (hash.startsWith('/tv/')) {
                const id = hash.split('/')[2];
                if (id) renderDetails(app, 'tv', id);
            } else {
                app.innerHTML = '<div class="text-center py-32 text-2xl font-bold text-gray-500">Page Not Found</div>';
            }
        }

        window.addEventListener('hashchange', router);
        window.addEventListener('DOMContentLoaded', () => {
            router();
            setTimeout(() => {
                const splash = document.getElementById('introSplash');
                if (splash) {
                    splash.style.animation = 'fade-out-intro 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards';
                    setTimeout(() => {
                        splash.remove();
                    }, 600);
                }
            }, 2300);
        });
    </script>
</body>

</html>
